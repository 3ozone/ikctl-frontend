version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* se incrustan en el bundle en tiempo de build.
        # En local el backend está expuesto en el puerto 8000 del host,
        # que es accesible desde el navegador del usuario.
        # En producción sobreescribir con la URL pública del backend.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8089/api/v1}
    container_name: ikctl-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      TZ: UTC
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - ikctl-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  # Red definida por el docker-compose de ikctl (backend).
  # Arrancar primero: `docker compose -f ../ikctl/docker-compose.yml up -d`
  ikctl-network:
    driver: bridge
    # external: true
